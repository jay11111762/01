<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="../Assets/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouncy Ball - Physics Lab</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        canvas {
            display: block;
        }

        .description-container {
            position: absolute;
            left: 40px;
            top: 50%;
            transform: translateY(-50%);
            width: 280px;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            line-height: 1.5;
            text-align: left;
            pointer-events: none;
            mix-blend-mode: difference;
            white-space: pre-wrap;
            z-index: 999;
        }

        .desc-title {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .desc-body {
            display: block;
            color: #ccc;
        }

        .dud {
            color: #666;
        }
    </style>

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sabum.me/03_Playground/lab_bouncy_ball.html">
    <meta property="og:title" content="Bouncy Ball - SABUM Lab">
    <meta property="og:description" content="Interactive visual experiment by SABUM">
    <meta property="og:image" content="https://sabum.me/assets/og-lab.png">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Bouncy Ball - SABUM Lab">
    <meta name="twitter:description" content="Interactive visual experiment by SABUM">
    <meta name="twitter:image" content="https://sabum.me/assets/og-lab.png">
</head>

<body>
    <canvas id="canvas"></canvas>

    <div id="description-container" class="description-container">
        <span id="desc-title" class="desc-title"></span>
        <span id="desc-body" class="desc-body"></span>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;
        // 큰 원 설정
        const defaultRadius = 280;
        const minRadius = 120;
        const maxRadius = 380;
        let containerRadius = defaultRadius;
        let circleColor = 'rgba(255, 255, 255, 0.3)';
        let tensionFlash = 0;  // 긴장감 플래시 (빨강)
        let collisionFlash = 0;  // 충돌 플래시
        let collisionHue = 0;  // 충돌 시 프리즘 컨러

        // 원 변형 효과
        let impactAngle = 0;  // 충돌 각도
        let bulgeAmount = 0;  // 불룩 크기
        let vibration = 0;    // 전체 진동

        // 오디오 설정
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playBounceSound() {
            if (!audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            // 원 크기에 따른 음높이 (작을수록 고음, 클수록 저음)
            // minRadius(180) → 고음(400Hz), maxRadius(380) → 저음(100Hz)
            const sizeRatio = (containerRadius - minRadius) / (maxRadius - minRadius);  // 0~1
            const baseFreq = 400 - (sizeRatio * 300);  // 400Hz → 100Hz
            const randomFreq = baseFreq + (Math.random() - 0.5) * 50;  // ±25Hz 랜덤

            osc.type = 'sine';
            osc.frequency.setValueAtTime(randomFreq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(randomFreq * 1.5, audioCtx.currentTime + 0.05);  // 플링 효과

            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        // ★★★ 사용자 상호작용 시 오디오 초기화 + 활성화 ★★★
        function activateAudio() {
            initAudio();
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        ['click', 'mousemove', 'keydown', 'touchstart', 'touchend'].forEach(event => {
            document.addEventListener(event, activateAudio, { once: false, passive: true });
        });
        // 스파크 파편
        const sparks = [];

        function createSparks(x, y, angle) {
            const count = 3 + Math.floor(Math.random() * 4);  // 3~6개
            for (let i = 0; i < count; i++) {
                const spreadAngle = angle + (Math.random() - 0.5) * 1.2;  // 충돌 방향 기준 ±35도
                const speed = 4 + Math.random() * 6;
                sparks.push({
                    x: x,
                    y: y,
                    vx: Math.cos(spreadAngle) * speed,
                    vy: Math.sin(spreadAngle) * speed,
                    life: 1,  // 1 → 0
                    hue: Math.random() * 360,  // 프리즘 컬러
                    length: 8 + Math.random() * 12  // 스파크 길이
                });
            }
        }

        // 공 설정
        const ball = {
            x: 0,
            y: 0,
            vx: 0,
            vy: 0,
            radius: 12,
            // 스쿼시/스트레치
            scaleX: 1,
            scaleY: 1,
            squashAmount: 0
        };

        // 물리 상수
        const gravity = 0.4;
        const bounce = 0.85;      // 반발 계수
        const friction = 0.995;   // 공기 저항
        const squashRecovery = 0.15;  // 찌그러짐 복원 속도

        // 프리즘 파티클 설정
        const particles = [];
        const particleCount = 1000;  // 3px 파티클
        const smallParticleCount = 800;  // 2px 파티클
        const tinyParticleCount = 6000;  // 1px 파티클

        function createParticles() {
            particles.length = 0;
            const totalCount = particleCount + smallParticleCount + tinyParticleCount;

            for (let i = 0; i < totalCount; i++) {
                let radius = 3;
                if (i >= particleCount + smallParticleCount) radius = 1;
                else if (i >= particleCount) radius = 2;

                // 큰 원 안에 랜덤 위치
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * (containerRadius - radius - 10);
                particles.push({
                    x: centerX + Math.cos(angle) * dist,
                    y: centerY + Math.sin(angle) * dist,
                    vx: (Math.random() - 0.5) * 1.5,
                    vy: (Math.random() - 0.5) * 1.5,
                    hue: (i / totalCount) * 360,  // 프리즘 컬러
                    radius: radius
                });
            }
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            centerX = width / 2;
            centerY = height / 2;

            // 공 초기 위치 (중앙)
            ball.x = centerX;
            ball.y = centerY;
            ball.vx = 0;
            ball.vy = 0;

            // 파티클 생성
            createParticles();
        }

        window.addEventListener('resize', resize);
        resize();

        function update() {
            // 큰 원 수축 (매 프레임 0.2px)
            containerRadius -= 0.2;

            // 긴장감 플래시 감소
            if (tensionFlash > 0) tensionFlash -= 0.05;
            // 충돌 플래시 감소 (자연스럽게)
            if (collisionFlash > 0) collisionFlash -= 0.03;

            // 불룩 효과 감쇠 (스프링처럼)
            bulgeAmount *= 0.85;
            // 진동 효과 감쇠
            vibration *= 0.9;

            // 최소/최대 도달 시 리셋
            if (containerRadius <= minRadius || containerRadius >= maxRadius) {
                tensionFlash = 1;  // 빨간 플래시
                containerRadius = defaultRadius;  // 원래 크기로
            }

            // 원 색상 (우선순위: 긴장감 > 충돌 > 기본)
            if (tensionFlash > 0) {
                // 빨간색 (긴장감)
                circleColor = `rgba(255, ${Math.floor(100 * (1 - tensionFlash))}, ${Math.floor(100 * (1 - tensionFlash))}, ${0.3 + tensionFlash * 0.5})`;
            } else if (collisionFlash > 0) {
                // 프리즘 컨러 (충돌)
                const alpha = 0.3 + collisionFlash * 0.7;
                circleColor = `hsla(${collisionHue}, 100%, 60%, ${alpha})`;
            } else {
                circleColor = 'rgba(255, 255, 255, 0.3)';
            }

            // 중력 적용
            ball.vy += gravity;

            // 공기 저항
            ball.vx *= friction;
            ball.vy *= friction;


            // 위치 업데이트
            ball.x += ball.vx;
            ball.y += ball.vy;

            // 큰 원 경계와 충돌 체크
            const dx = ball.x - centerX;
            const dy = ball.y - centerY;
            const distFromCenter = Math.sqrt(dx * dx + dy * dy);
            const maxDist = containerRadius - ball.radius;

            if (distFromCenter > maxDist) {
                // 충돌! 경계 밖으로 나감
                const angle = Math.atan2(dy, dx);

                // 위치 보정 (경계 안으로)
                ball.x = centerX + Math.cos(angle) * maxDist;
                ball.y = centerY + Math.sin(angle) * maxDist;

                // 속도 벡터를 법선 기준으로 반사
                const normalX = dx / distFromCenter;
                const normalY = dy / distFromCenter;

                // 법선 방향 속도 성분
                const dotProduct = ball.vx * normalX + ball.vy * normalY;

                // 반사
                ball.vx -= 2 * dotProduct * normalX;
                ball.vy -= 2 * dotProduct * normalY;

                // 무작위 각도 추가 (±30도)
                const randomAngle = (Math.random() - 0.5) * Math.PI / 3;
                const cos = Math.cos(randomAngle);
                const sin = Math.sin(randomAngle);
                const newVx = ball.vx * cos - ball.vy * sin;
                const newVy = ball.vx * sin + ball.vy * cos;
                ball.vx = newVx;
                ball.vy = newVy;

                // 반발 계수 적용
                ball.vx *= bounce;
                ball.vy *= bounce;

                // 충돌 시 큰 원 확장 (200px 미만이면 +6px, 아니면 +4px)
                containerRadius += containerRadius < 200 ? 6 : 4;
                collisionFlash = 1;
                collisionHue = Math.random() * 360;  // 랜덤 프리즘 컬러

                // 스파크 생성 (외곽 바깥으로)
                createSparks(ball.x, ball.y, angle);

                // 원 변형 효과
                impactAngle = angle;
                bulgeAmount = 15;  // 불룩 크기
                vibration = 5;     // 진동 강도

                // 사운드 재생
                playBounceSound();
                // 충돌 시 에너지 보충 (스프링 효과)
                const collisionSpeed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
                if (collisionSpeed < 12) {
                    const springBoost = 2.2;
                    ball.vx *= springBoost;
                    ball.vy *= springBoost;
                }

                // 스쿼시 효과 (충돌 강도에 비례)
                const impactSpeed = Math.abs(dotProduct);
                ball.squashAmount = Math.min(impactSpeed * 0.03, 0.3);
            }

            // 스쿼시 복원
            ball.squashAmount *= (1 - squashRecovery);

            // 속도에 따른 스트레치
            const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
            const stretchAmount = Math.min(speed * 0.008, 0.15);

            // 스쿼시 또는 스트레치 적용
            if (ball.squashAmount > stretchAmount) {
                // 충돌 직후: 스쿼시
                ball.scaleX = 1 + ball.squashAmount;
                ball.scaleY = 1 - ball.squashAmount * 0.5;
            } else {
                // 이동 중: 스트레치
                ball.scaleX = 1 - stretchAmount * 0.3;
                ball.scaleY = 1 + stretchAmount * 0.5;
            }

            // 파티클 업데이트 (무중력)
            for (let p of particles) {
                // 공과의 거리 계산 (자석 반발)
                const toBallX = p.x - ball.x;
                const toBallY = p.y - ball.y;
                const distToBall = Math.sqrt(toBallX * toBallX + toBallY * toBallY);
                const repelRadius = 90;  // 반발 영향 범위

                if (distToBall < repelRadius && distToBall > 0) {
                    // 반발력 (가까울수록 강함)
                    const force = (repelRadius - distToBall) / repelRadius * 1.3;
                    const repelX = (toBallX / distToBall) * force;
                    const repelY = (toBallY / distToBall) * force;
                    p.vx += repelX;
                    p.vy += repelY;
                }

                // 공과 가까우면 흰색으로 (거리에 따라 변화)
                const whiteRadius = 180;
                p.whiteness = distToBall < whiteRadius ? 1 - (distToBall / whiteRadius) : 0;

                p.x += p.vx;
                p.y += p.vy;

                // 속도 감쇠 (안정화) - 약하게
                p.vx *= 0.995;
                p.vy *= 0.995;

                // 최소 속도 유지 (멈추지 않게)
                const pSpeed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
                if (pSpeed < 0.5) {
                    const minSpeed = 0.8;
                    const angle = Math.random() * Math.PI * 2;
                    p.vx = Math.cos(angle) * minSpeed;
                    p.vy = Math.sin(angle) * minSpeed;
                }

                // 큰 원 경계 충돌
                const pdx = p.x - centerX;
                const pdy = p.y - centerY;
                const pDist = Math.sqrt(pdx * pdx + pdy * pdy);
                const pMaxDist = containerRadius - p.radius;

                if (pDist > pMaxDist) {
                    // 반사
                    const pAngle = Math.atan2(pdy, pdx);
                    p.x = centerX + Math.cos(pAngle) * pMaxDist;
                    p.y = centerY + Math.sin(pAngle) * pMaxDist;

                    const pNormalX = pdx / pDist;
                    const pNormalY = pdy / pDist;
                    const pDot = p.vx * pNormalX + p.vy * pNormalY;
                    p.vx -= 2 * pDot * pNormalX;
                    p.vy -= 2 * pDot * pNormalY;
                }

                // 색상 변화 (프리즘 효과)
                p.hue = (p.hue + 0.3) % 360;
            }

            // 스파크 업데이트
            for (let i = sparks.length - 1; i >= 0; i--) {
                const s = sparks[i];
                s.x += s.vx;
                s.y += s.vy;
                s.life -= 0.06;  // 빠르게 소멸 (~0.3초)

                if (s.life <= 0) {
                    sparks.splice(i, 1);
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);

            // 큰 원 (아웃라인)
            ctx.beginPath();
            ctx.arc(centerX, centerY, containerRadius, 0, Math.PI * 2);
            ctx.strokeStyle = circleColor;
            ctx.lineWidth = 1 + collisionFlash;  // 기본 1px, 충돌 시 최대 2px
            ctx.stroke();

            // 프리즘 파티클 그리기
            for (let p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                // 공과 가까우면 흰색으로 변화
                const w = p.whiteness || 0;
                const saturation = 100 * (1 - w);
                const lightness = 60 + (40 * w);  // 60% → 100%
                ctx.fillStyle = `hsl(${p.hue}, ${saturation}%, ${lightness}%)`;
                ctx.fill();
            }

            // 공 그리기 (스쿼시/스트레치 적용)
            ctx.save();
            ctx.translate(ball.x, ball.y);

            // 이동 방향으로 회전 (스트레치 방향)
            if (Math.abs(ball.vx) > 0.1 || Math.abs(ball.vy) > 0.1) {
                const moveAngle = Math.atan2(ball.vy, ball.vx);
                ctx.rotate(moveAngle);
            }

            ctx.scale(ball.scaleY, ball.scaleX);  // 스트레치 방향 맞춤

            ctx.beginPath();
            ctx.arc(0, 0, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();

            ctx.restore();

            // 스파크 그리기
            for (let s of sparks) {
                const sparkAngle = Math.atan2(s.vy, s.vx);
                ctx.save();
                ctx.translate(s.x, s.y);
                ctx.rotate(sparkAngle);

                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(s.length * s.life, 0);  // 길이도 페이드
                ctx.strokeStyle = `hsla(${s.hue}, 100%, 60%, ${s.life})`;
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.restore();
            }
        }

        function animate() {
            update();
            draw();
            requestAnimationFrame(animate);
        }

        animate();

        // TextScramble 클래스 (유고 모션)
        class TextScramble {
            constructor(el) {
                this.el = el;
                this.upperChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ!<>-_\\/[]{}—=+*^?#';
                this.lowerChars = 'abcdefghijklmnopqrstuvwxyz!<>-_\\/[]{}—=+*^?#';
                this.defaultChars = '!<>-_\\/[]{}—=+*^?#';
                this.update = this.update.bind(this);
            }
            getRandomChar(targetChar) {
                if (targetChar && targetChar.match(/[A-Z]/)) {
                    return this.upperChars[Math.floor(Math.random() * this.upperChars.length)];
                } else if (targetChar && targetChar.match(/[a-z]/)) {
                    return this.lowerChars[Math.floor(Math.random() * this.lowerChars.length)];
                }
                return this.defaultChars[Math.floor(Math.random() * this.defaultChars.length)];
            }
            setText(newText) {
                const oldText = this.el.innerText;
                const length = Math.max(oldText.length, newText.length);
                const promise = new Promise((resolve) => this.resolve = resolve);
                this.queue = [];
                for (let i = 0; i < length; i++) {
                    const from = oldText[i] || '';
                    const to = newText[i] || '';
                    const start = Math.floor(Math.random() * 40);
                    const end = start + Math.floor(Math.random() * 40);
                    this.queue.push({ from, to, start, end });
                }
                cancelAnimationFrame(this.frameRequest);
                this.frame = 0;
                this.update();
                return promise;
            }
            update() {
                let output = '';
                let complete = 0;
                for (let i = 0, n = this.queue.length; i < n; i++) {
                    let { from, to, start, end, char } = this.queue[i];
                    if (this.frame >= end) { complete++; output += to; }
                    else if (this.frame >= start) {
                        if (!char || Math.random() < 0.28) {
                            char = this.getRandomChar(to);
                            this.queue[i].char = char;
                        }
                        output += `<span class="dud">${char}</span>`;
                    } else { output += from; }
                }
                this.el.innerHTML = output;
                if (complete === this.queue.length) { this.resolve(); }
                else { this.frameRequest = requestAnimationFrame(this.update); this.frame++; }
            }
        }

        // 설명 텍스트 표시
        const titleEl = document.getElementById('desc-title');
        const bodyEl = document.getElementById('desc-body');
        const fxTitle = new TextScramble(titleEl);
        const fxBody = new TextScramble(bodyEl);

        setTimeout(() => {
            fxTitle.setText('PRISM BOUNCE').then(() => {
                setTimeout(() => {
                    fxBody.setText(`A living ecosystem of physics.

White ball bounces infinitely
inside a breathing container.

7,800 prism particles repel
from the ball with magnetic
force, shifting to white
when near.

Sparks fly on collision.
Sound responds to impact.

Balance of forces: container
shrinks, collisions expand.`);
                }, 500);
            });
        }, 1000);
    </script>
</body>

</html>
