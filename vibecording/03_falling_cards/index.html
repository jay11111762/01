<!DOCTYPE html>

<head>
    <link rel="icon" type="image/png" href="../Assets/favicon.png">

    <title>Falling Cards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .clock-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .card-stack {
            position: relative;
            perspective: 1000px;
            width: 200px;
            height: 317px;
        }

        .card-label {
            font-size: 12px;
            color: inherit;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            letter-spacing: 1px;
            margin-top: 30px;
        }

        .card {
            position: absolute;
            /* 신용카드 비율: 85.6mm × 53.98mm = 약 1.586:1 (가로:세로) */
            /* 세로로 긴 카드이므로 반대로: 1:1.586 */
            width: 200px;
            height: 317px;
            border-radius: 16px;
            border: 3px solid #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 280px;
            line-height: 0.85;
            font-weight: 400;
            color: #000;
            transition: none;
            transform-origin: center center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            padding-top: 10px;
        }

        .card.falling {
            transition: transform 0.8s cubic-bezier(0.87, 0, 0.13, 1);
            /* strong ease-in-out */
        }

        .card.intro {
            transition: transform 0.6s cubic-bezier(0.87, 0, 0.13, 1);
            /* strong ease-in-out */
        }

        /* 왼쪽 설명 컴포넌트 */
        .description-container {
            position: absolute;
            left: 40px;
            top: 50%;
            transform: translateY(-50%);
            width: 280px;
            color: #ffffff;
            font-size: 12px;
            line-height: 1.6;
            z-index: 10;
            mix-blend-mode: difference;
        }

        @media (max-width: 768px) {
            .description-container {
                display: none;
            }

            .card {
                width: 150px;
                height: 238px;
                font-size: 200px;
                border-radius: 12px;
            }
        }

        .title {
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 12px;
            color: #ffffff;
        }

        .description {
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
        }
    </style>

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sabum.me/03_Playground/lab_falling_cards.html">
    <meta property="og:title" content="FALLING CARDS - SABUM Lab">

<body>
    <div class="description-container">
        <div class="title">FALLING CARDS</div>
        <p class="description">
            Stacked number cards with<br>
            gravity-based falling animation.<br>
            Cards fall every second.
        </p>
    </div>

    <div class="container">
        <div class="clock-container" id="clockContainer">
            <!-- 6개의 카드 스택 (HH:MM:SS) -->
        </div>
    </div>

    <script>
        // 이미지에서 추출한 색상 팔레트
        const COLORS = [
            '#1034A6', // 파랑
            '#8B5A2B', // 갈색
            '#F5A623', // 주황
            '#E85D9C', // 핑크
            '#1034A6', // 파랑
            '#FF5722', // 주황/빨강
            '#FFFFFF', // 흰색
            '#1B9E4B'  // 초록
        ];

        // 실로폰 음계 (색상별 주파수)
        const XYLOPHONE_NOTES = {
            '#1034A6': 523.25,  // C5 (도)
            '#8B5A2B': 587.33,  // D5 (레)
            '#F5A623': 659.25,  // E5 (미)
            '#E85D9C': 698.46,  // F5 (파)
            '#FF5722': 783.99,  // G5 (솔)
            '#FFFFFF': 880.00,  // A5 (라)
            '#1B9E4B': 987.77   // B5 (시)
        };

        // 위치별 음계 (카드 떨어질 때)
        const POSITION_NOTES = [523.25, 587.33, 659.25, 698.46, 783.99, 880.00]; // C5-A5

        let audioCtx = null;
        let audioEnabled = false;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            audioEnabled = true;
        }

        // 사용자 상호작용으로 오디오 활성화
        document.addEventListener('click', initAudio, { once: true });
        document.addEventListener('keydown', initAudio, { once: true });
        document.addEventListener('touchstart', initAudio, { once: true });

        function playXylophone(frequency, duration = 0.3, volume = 0.3) {
            if (!audioCtx || !audioEnabled) return;

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            // 실로폰 톤 (사인파 + 하모닉스)
            osc.type = 'sine';
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);

            // 빠른 감쇠 (실로폰 특성)
            gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playColorSound(color) {
            const freq = XYLOPHONE_NOTES[color] || 523.25;
            playXylophone(freq, 0.15, 0.2);
        }

        function playDropSound(stackIndex) {
            const freq = POSITION_NOTES[stackIndex] || 523.25;
            playXylophone(freq, 0.4, 0.4);
        }

        const DIGIT_COUNT = 6; // HH:MM:SS
        const CARDS_PER_STACK = 8; // 각 자리당 8장 카드
        const ZIGZAG_ANGLE = 2; // 지그재그 각도 (도)
        const ZIGZAG_OFFSET = 4; // 지그재그 X 오프셋 (px)
        const CARD_GAP = 220; // 카드 간격

        let stacks = []; // 6개 스택
        let currentDigits = ['0', '0', '0', '0', '0', '0'];

        function getTimeDigits() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            return [h[0], h[1], m[0], m[1], s[0], s[1]];
        }

        const NUMBER_WORDS = ['ZERO', 'ONE', 'TWO', 'THREE', 'FOUR', 'FIVE', 'SIX', 'SEVEN', 'EIGHT', 'NINE'];

        function createCardStack(stackIndex, initialDigit) {
            const stackWrapper = document.createElement('div');
            stackWrapper.className = 'card-stack';

            const cards = [];
            // 각 스택마다 랜덤한 색상 오프셋
            const colorOffset = Math.floor(Math.random() * COLORS.length);

            for (let i = 0; i < CARDS_PER_STACK; i++) {
                const card = document.createElement('div');
                card.className = 'card';
                const colorIndex = (i + colorOffset) % COLORS.length;
                card.style.backgroundColor = COLORS[colorIndex];

                // 첫 번째 카드만 현재 시간 표시, 나머지는 랜덤
                const digit = i === CARDS_PER_STACK - 1 ? initialDigit : Math.floor(Math.random() * 10);

                // 숫자 span
                const numSpan = document.createElement('span');
                numSpan.className = 'card-number';
                numSpan.textContent = digit;
                card.appendChild(numSpan);

                // 영문 라벨
                const label = document.createElement('span');
                label.className = 'card-label';
                label.textContent = NUMBER_WORDS[digit];
                card.appendChild(label);

                // 흰색 카드는 검정 텍스트
                if (COLORS[colorIndex] === '#FFFFFF') {
                    card.style.color = '#000000';
                } else {
                    card.style.color = '#FFFFFF';
                }

                // 지그재그 배치 (랜덤 각도)
                const angle = (Math.random() - 0.5) * ZIGZAG_ANGLE * 2;
                const offsetX = (Math.random() - 0.5) * ZIGZAG_OFFSET * 2;

                card.style.zIndex = i + 1;
                card.style.transform = `translateX(${offsetX}px) rotate(${angle}deg)`;
                card.dataset.originalTransform = `translateX(${offsetX}px) rotate(${angle}deg)`;

                stackWrapper.appendChild(card);
                cards.push(card);
            }

            return { wrapper: stackWrapper, cards };
        }

        function dropCard(stackIndex, newDigit) {
            const stack = stacks[stackIndex];
            if (!stack) return;

            // 맨 앞 카드 찾기 (가장 높은 z-index)
            let topCard = null;
            let topZIndex = -1;
            let nextCard = null;
            let nextZIndex = -1;

            stack.cards.forEach(card => {
                const z = parseInt(card.style.zIndex) || 0;
                if (z > topZIndex) {
                    nextCard = topCard;
                    nextZIndex = topZIndex;
                    topZIndex = z;
                    topCard = card;
                } else if (z > nextZIndex) {
                    nextCard = card;
                    nextZIndex = z;
                }
            });

            if (!topCard) return;

            // 다음 카드에 새 숫자 표시 (떨어지기 전에!)
            if (nextCard) {
                nextCard.querySelector('.card-number').textContent = newDigit;
                nextCard.querySelector('.card-label').textContent = NUMBER_WORDS[newDigit];
            }

            // 랜덤 속도 (딜레이 없음)
            const randomDuration = 0.6 + Math.random() * 0.6; // 0.6s ~ 1.2s

            // 떨어지는 중 표시 (wobble 충돌 방지)
            topCard.dataset.falling = 'true';

            // 실로폰 사운드 재생
            playDropSound(stackIndex);

            // 떨어지는 애니메이션
            topCard.style.transition = `transform ${randomDuration}s cubic-bezier(0.87, 0, 0.13, 1)`;
            const currentTransform = topCard.dataset.originalTransform;
            const fallDistance = window.innerHeight + 400;

            topCard.style.transform = `${currentTransform} translateY(${fallDistance}px) rotate(${Math.random() * 70 - 35}deg)`;

            // 애니메이션 완료 후 처리
            setTimeout(() => {
                topCard.style.transition = 'none';
                topCard.style.zIndex = 0;
                delete topCard.dataset.falling;

                // 모든 카드 z-index 증가
                stack.cards.forEach(card => {
                    if (card !== topCard) {
                        card.style.zIndex = parseInt(card.style.zIndex) + 1;
                    }
                });

                // 맨 뒤로 간 카드는 랜덤 숫자
                const randomNum = Math.floor(Math.random() * 10);
                topCard.querySelector('.card-number').textContent = randomNum;
                topCard.querySelector('.card-label').textContent = NUMBER_WORDS[randomNum];
                topCard.style.transform = topCard.dataset.originalTransform;
            }, randomDuration * 1000 + 50);
        }

        function updateClock() {
            const newDigits = getTimeDigits();

            for (let i = 0; i < DIGIT_COUNT; i++) {
                if (newDigits[i] !== currentDigits[i]) {
                    // 숫자가 변경된 경우 카드 떨어뜨리기
                    dropCard(i, newDigits[i]);
                    currentDigits[i] = newDigits[i];
                }
            }
        }

        function init() {
            const container = document.getElementById('clockContainer');
            container.innerHTML = '';
            stacks = [];
            currentDigits = getTimeDigits();

            // 6개 스택 생성
            for (let i = 0; i < DIGIT_COUNT; i++) {
                const stack = createCardStack(i, currentDigits[i]);
                container.appendChild(stack.wrapper);
                stacks.push(stack);
            }

            // 인트로 애니메이션: 위에서 떨어지는 모션
            playIntroAnimation();

            // 매초 시간 체크
            setTimeout(() => {
                setInterval(updateClock, 100);
                // 1초마다 지그재그 미세 움직임
                setInterval(wobbleCards, 1000);
                // 5초마다 맨 앞 카드 색상 드르르르륵 변경
                setInterval(cycleTopCardColors, 5000);
            }, 1500); // 인트로 후 시작
        }

        function forceDropCard(stackIndex) {
            const stack = stacks[stackIndex];
            if (!stack) return;

            // 맨 앞 카드 찾기
            let topCard = null;
            let topZIndex = -1;

            stack.cards.forEach(card => {
                const z = parseInt(card.style.zIndex) || 0;
                if (z > topZIndex && !card.dataset.falling) {
                    topZIndex = z;
                    topCard = card;
                }
            });

            if (!topCard) return;

            // 새 숫자 생성
            const newNum = Math.floor(Math.random() * 10);

            // 다음 카드 찾기
            let nextCard = null;
            let nextZIndex = -1;
            stack.cards.forEach(card => {
                const z = parseInt(card.style.zIndex) || 0;
                if (z > nextZIndex && z < topZIndex && !card.dataset.falling) {
                    nextZIndex = z;
                    nextCard = card;
                }
            });

            if (nextCard) {
                nextCard.querySelector('.card-number').textContent = newNum;
                nextCard.querySelector('.card-label').textContent = NUMBER_WORDS[newNum];
            }

            // 빠른 낙하
            topCard.dataset.falling = 'true';
            playDropSound(stackIndex);

            const duration = 0.4 + Math.random() * 0.3;
            topCard.style.transition = `transform ${duration}s cubic-bezier(0.87, 0, 0.13, 1)`;
            const fallDistance = window.innerHeight + 400;
            topCard.style.transform = `${topCard.dataset.originalTransform} translateY(${fallDistance}px) rotate(${Math.random() * 70 - 35}deg)`;

            setTimeout(() => {
                topCard.style.transition = 'none';
                topCard.style.zIndex = 0;
                delete topCard.dataset.falling;

                stack.cards.forEach(card => {
                    if (card !== topCard) {
                        card.style.zIndex = parseInt(card.style.zIndex) + 1;
                    }
                });

                const randNum = Math.floor(Math.random() * 10);
                topCard.querySelector('.card-number').textContent = randNum;
                topCard.querySelector('.card-label').textContent = NUMBER_WORDS[randNum];
                topCard.style.transform = topCard.dataset.originalTransform;
            }, duration * 1000 + 50);
        }

        function cycleTopCardColors() {
            stacks.forEach(stack => {
                // 맨 앞 카드 찾기
                let topCard = null;
                let topZIndex = -1;

                stack.cards.forEach(card => {
                    const z = parseInt(card.style.zIndex) || 0;
                    if (z > topZIndex) {
                        topZIndex = z;
                        topCard = card;
                    }
                });

                if (!topCard || topCard.dataset.falling) return;

                // 드르르르륵 색상 변경 (12번 빠르게 변경 후 최종 색상)
                let cycleCount = 0;
                const totalCycles = 12;
                const cycleInterval = setInterval(() => {
                    const randomColor = COLORS[Math.floor(Math.random() * COLORS.length)];
                    topCard.style.backgroundColor = randomColor;

                    // 실로폰 사운드 재생
                    playColorSound(randomColor);

                    // 흰색이면 검정 텍스트
                    if (randomColor === '#FFFFFF') {
                        topCard.style.color = '#000000';
                    } else {
                        topCard.style.color = '#FFFFFF';
                    }

                    cycleCount++;
                    if (cycleCount >= totalCycles) {
                        clearInterval(cycleInterval);
                    }
                }, 50); // 50ms 간격으로 빠르게 변경
            });
        }

        function wobbleCards() {
            stacks.forEach(stack => {
                stack.cards.forEach(card => {
                    // 떨어지는 중인 카드는 제외
                    if (card.dataset.falling) return;

                    // 현재 transform에서 약간씩 변화
                    const newAngle = (Math.random() - 0.5) * ZIGZAG_ANGLE * 2;
                    const newOffsetX = (Math.random() - 0.5) * ZIGZAG_OFFSET * 2;
                    const newTransform = `translateX(${newOffsetX}px) rotate(${newAngle}deg)`;

                    card.style.transition = 'transform 0.5s ease-out';
                    card.style.transform = newTransform;
                    card.dataset.originalTransform = newTransform;
                });
            });
        }

        function playIntroAnimation() {
            const startY = -window.innerHeight - 400;

            // 모든 카드를 화면 위로 이동
            stacks.forEach((stack, stackIdx) => {
                stack.cards.forEach((card, cardIdx) => {
                    const originalTransform = card.dataset.originalTransform;
                    card.style.transform = `${originalTransform} translateY(${startY}px)`;
                });
            });

            // 순차적으로 떨어지기
            setTimeout(() => {
                stacks.forEach((stack, stackIdx) => {
                    stack.cards.forEach((card, cardIdx) => {
                        const delay = stackIdx * 80 + cardIdx * 30;
                        setTimeout(() => {
                            card.classList.add('intro');
                            card.style.transform = card.dataset.originalTransform;
                            setTimeout(() => card.classList.remove('intro'), 600);
                        }, delay);
                    });
                });
            }, 100);
        }

        init();
    </script>
</body>
